<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英語クイズアプリ</title>
    <!-- 安全性の高いCDN（Cloudflare） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <style>
      /* 全体のスクロールを防ぎ、iPadのブラウザバーの干渉を防ぐ */
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none; /* ピンチズームやスワイプなどの誤作動を防止 */
      }
      .btn-3d { border-bottom-width: 6px; transition: transform 0.1s, border-width 0.1s, filter 0.3s; }
      .btn-3d:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }
      .btn-wrong { opacity: 0.4; transform: scale(0.96); filter: grayscale(80%); pointer-events: none; }
      .btn-correct { animation: correct-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; z-index: 10; }
      @keyframes correct-pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); box-shadow: 0 0 30px rgba(255, 255, 255, 0.8); }
        100% { transform: scale(1.01); box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); border-bottom-width: 6px; }
      }
      .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body>
    <div id="root">
        <div style="text-align: center; padding: 50px; font-family: sans-serif; background: #e0e7ff; height: 100dvh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <h2 style="color: #4c1d95; font-size: 24px; font-weight: bold; margin-bottom: 10px;">🚀 アプリを読み込み中...</h2>
            <p style="color: #4b5563;">画面が切り替わらない場合は、コードにエラーがある可能性があります。</p>
            <pre id="error-log" style="color: #dc2626; text-align: left; background: #fee2e2; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; font-size: 14px; display: none;"></pre>
        </div>
    </div>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var log = document.getElementById('error-log');
            if(log) {
                log.style.display = 'block';
                log.innerText += '【エラーが発生しました】\n' + msg + '\n行番号: ' + lineNo + '\n';
            }
            return false;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // アイコン群
        const Timer = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="14" r="8"/><path d="M12 2v4"/><path d="M12 14 9.5 11.5"/><path d="M15 2h-6"/></svg>;
        const Trophy = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const Target = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const AlertCircle = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const BookOpen = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const VolumeIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>;
        const ShuffleIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>;
        const UndoIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;

        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLanCzRiH5cWaWgkw30LdLs9zjmXPYb8_fBpFMSfRHIjdfr7ukdY1m_a5ZtJ98zPeq/exec";

        const OPTION_COLORS = [
            { bg: 'bg-rose-500', border: 'border-rose-700' }, { bg: 'bg-blue-500', border: 'border-blue-700' },
            { bg: 'bg-amber-400', border: 'border-amber-600' }, { bg: 'bg-emerald-500', border: 'border-emerald-700' }
        ];

        const DUMMY_WORDS = [
            { unit: "01-U1", part: "1-L1", en: "make friends", ja: "友達を作る", pos: "フレーズ", definition: "" },
            { unit: "01-U1", part: "1-L1", en: "anime", ja: "(日本の)アニメ", pos: "名", definition: "Japanese animation for television and films" },
            { unit: "01-U1", part: "1-L1", en: "dialect", ja: "(地域)方言", pos: "名", definition: "a form of a language spoken in a particular area" },
            { unit: "01-U1", part: "1-L1", en: "unique", ja: "特有の", pos: "形", definition: "being the only existing one of its type" }
        ];

        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);
        const calculateTimeLimit = (q) => q * 3;

        const App = () => {
            const [gameState, setGameState] = useState('loading'); // 'loading', 'menu', 'playing', 'learning', 'result'
            const [allWords, setAllWords] = useState([]);
            const [selectedUnit, setSelectedUnit] = useState("");
            const [selectedPart, setSelectedPart] = useState("");
            const [mode, setMode] = useState('ja-en');
            const [errorMsg, setErrorMsg] = useState("");
            
            // クイズ用
            const [wordPool, setWordPool] = useState([]);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [timeLeft, setTimeLeft] = useState(0);
            const [totalTime, setTotalTime] = useState(0);
            const [score, setScore] = useState({ correct: 0, wrong: 0 });
            const [selectedWrongOptions, setSelectedWrongOptions] = useState([]);
            const [isTransitioning, setIsTransitioning] = useState(false);

            // 学習モード用
            const [originalLearningWords, setOriginalLearningWords] = useState([]); // 元の順番を保持
            const [learningWords, setLearningWords] = useState([]); // 表示される順番
            const [learningIndex, setLearningIndex] = useState(0);
            const [learningTab, setLearningTab] = useState('list'); // ① デフォルトを「単語リスト(list)」に変更
            const [learningCardMode, setLearningCardMode] = useState('en-ja'); // 'en-ja' (英語➔日本語), 'ja-en' (日本語➔英語)
            const [showCardAnswer, setShowCardAnswer] = useState(false); // カードの解答表示ステート

            useEffect(() => {
                const fetchWords = async () => {
                    try {
                        const res = await fetch(GAS_WEB_APP_URL);
                        if (!res.ok) throw new Error();
                        const data = await res.json();
                        setAllWords(data);
                        setGameState('menu');
                    } catch (e) {
                        setErrorMsg("GASからのデータ取得に失敗しました。アクセス権限が「全員」になっているか確認してください。(現在はデモデータで動作中です)");
                        setAllWords(DUMMY_WORDS);
                        setGameState('menu');
                    }
                };
                fetchWords();
            }, []);

            const units = useMemo(() => [...new Set(allWords.map(w => w.unit))], [allWords]);
            useEffect(() => { if (units.length > 0 && !selectedUnit) setSelectedUnit(units[0]); }, [units, selectedUnit]);

            const partsInUnit = useMemo(() => [...new Set(allWords.filter(w => w.unit === selectedUnit).map(w => w.part))], [allWords, selectedUnit]);
            useEffect(() => { setSelectedPart(partsInUnit.length > 0 ? partsInUnit[0] : ""); }, [selectedUnit, partsInUnit]);

            useEffect(() => {
                let timer;
                if (gameState === 'playing' && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(prev => prev <= 1 ? (setGameState('result'), 0) : prev - 1), 1000);
                }
                return () => clearInterval(timer);
            }, [gameState, timeLeft]);

            // 音声読み上げ
            const speakWord = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    window.speechSynthesis.speak(utterance);
                }
            };

            const generateQuestion = (pool, targetWords) => {
                let nextPool = [...pool];
                if (nextPool.length === 0) nextPool = shuffleArray([...targetWords]);
                const answerWord = nextPool.pop();
                const otherWords = allWords.filter(w => w.en !== answerWord.en && (mode !== 'def-en' || (w.definition && w.definition.trim() !== "")));
                const wrongChoices = shuffleArray(otherWords).slice(0, 3);
                return { answerWord, options: shuffleArray([answerWord, ...wrongChoices]), nextPool };
            };

            // クイズスタート
            const startGame = () => {
                setErrorMsg("");
                let targetWords = allWords.filter(w => w.unit === selectedUnit && w.part === selectedPart);
                if (mode === 'def-en') targetWords = targetWords.filter(w => w.definition && w.definition.trim() !== "");
                
                if (targetWords.length < 4) {
                    setErrorMsg('選ばれた範囲の単語数が少なすぎます（最低4つ必要です）。現在の対象単語数: ' + targetWords.length);
                    return;
                }
                
                const timeLimit = calculateTimeLimit(targetWords.length);
                const { answerWord, options, nextPool } = generateQuestion([], targetWords);
                
                setWordPool(nextPool); setCurrentQuestion({ answerWord, options, targetWords });
                setScore({ correct: 0, wrong: 0 }); setTimeLeft(timeLimit); setTotalTime(timeLimit);
                setSelectedWrongOptions([]); setIsTransitioning(false); setGameState('playing');
            };

            // 学習モードスタート
            const startLearning = () => {
                setErrorMsg("");
                const targetWords = allWords.filter(w => w.unit === selectedUnit && w.part === selectedPart);
                if (targetWords.length === 0) {
                    setErrorMsg('選ばれた範囲に単語が見つかりませんでした。');
                    return;
                }
                setOriginalLearningWords(targetWords); // 元の順序を保管
                setLearningWords(targetWords);
                setLearningIndex(0);
                setShowCardAnswer(false);
                setLearningTab('list'); // ① 「単語リスト」をデフォルトにする
                setGameState('learning');
            };

            const handleAnswer = (option) => {
                if (isTransitioning) return;
                if (option.en === currentQuestion.answerWord.en) {
                    setScore(prev => ({ ...prev, correct: prev.correct + 1 })); setIsTransitioning(true);
                    setTimeout(() => {
                        setGameState(curr => {
                            if (curr === 'playing') {
                                const { answerWord, options, nextPool } = generateQuestion(wordPool, currentQuestion.targetWords);
                                setWordPool(nextPool); setCurrentQuestion(prev => ({ ...prev, answerWord, options }));
                                setSelectedWrongOptions([]); setIsTransitioning(false);
                            }
                            return curr;
                        });
                    }, 1000);
                } else if (!selectedWrongOptions.some(o => o.en === option.en)) {
                    setScore(prev => ({ ...prev, wrong: prev.wrong + 1 }));
                    setSelectedWrongOptions(prev => [...prev, option]);
                }
            };

            // 学習モード：シャッフル
            const shuffleLearningWords = () => {
                setLearningWords(shuffleArray([...learningWords]));
                setLearningIndex(0);
                setShowCardAnswer(false);
            };

            // ① 学習モード：順番を元に戻す
            const resetLearningWordsOrder = () => {
                setLearningWords([...originalLearningWords]);
                setLearningIndex(0);
                setShowCardAnswer(false);
            };

            // カードの進退管理
            const handleNextCard = () => {
                if (!showCardAnswer) {
                    // 解答をまだ表示していない場合、解答を表示する
                    setShowCardAnswer(true);
                    // 英語➔日本語モードの場合、解答表示と同時にネイティブ発音を鳴らすと親切
                    if (learningCardMode === 'en-ja') {
                        speakWord(learningWords[learningIndex].en);
                    }
                } else {
                    // すでに解答表示済みの場合は、次の単語へ進む
                    if (learningIndex < learningWords.length - 1) {
                        setLearningIndex(prev => prev + 1);
                        setShowCardAnswer(false);
                    }
                }
            };

            const handlePrevCard = () => {
                if (learningIndex > 0) {
                    setLearningIndex(prev => prev - 1);
                    setShowCardAnswer(false);
                }
            };

            const accuracy = score.correct + score.wrong > 0 ? Math.round((score.correct / (score.correct + score.wrong)) * 100) : 0;
            const finalScore = totalTime > 0 ? Math.max(0, Math.round(((score.correct * 100) - (score.wrong * 50)) * (60 / totalTime))) : 0;

            return (
                <div className="h-[100dvh] flex flex-col font-sans bg-gradient-to-br from-indigo-200 via-purple-200 to-pink-200 text-gray-800 overflow-hidden">
                    <div className="bg-white/30 backdrop-blur-md border-b border-white/50 text-purple-900 p-2 md:p-3 text-center font-black text-xl md:text-2xl shadow-sm z-10 tracking-widest uppercase flex items-center justify-center shrink-0">
                        <BookOpen className="mr-2 w-6 h-6" /> Word Master
                    </div>
                    
                    <div className="flex-1 p-3 md:p-4 flex flex-col relative overflow-hidden max-w-6xl mx-auto w-full">
                        
                        {gameState === 'loading' && (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-3">
                                <div className="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                                <div className="text-xl font-bold text-purple-800">データを読み込み中...</div>
                            </div>
                        )}
                        
                        {gameState === 'menu' && (
                            <div className="flex-1 flex flex-col justify-center max-w-3xl mx-auto w-full space-y-4 md:space-y-6 animate-fade-in">
                                <div className="text-center mb-2">
                                    <h2 className="text-3xl md:text-4xl font-black text-purple-900 drop-shadow-sm">学習設定</h2>
                                    <p className="text-purple-800 text-base md:text-lg mt-1 font-bold">範囲を選んでスタート！</p>
                                </div>

                                {errorMsg && (
                                    <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 rounded-xl shadow-md font-bold text-sm flex items-start">
                                        <AlertCircle className="w-5 h-5 mr-2 flex-shrink-0" />
                                        <p>{errorMsg}</p>
                                    </div>
                                )}

                                <div className="space-y-4 glass-panel p-5 md:p-8 rounded-[1.5rem] shadow-xl border border-white/60">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-5">
                                        <div className="space-y-1">
                                            <label className="block text-base md:text-lg font-bold text-gray-700">Unit (大単元)</label>
                                            <select value={selectedUnit} onChange={(e) => setSelectedUnit(e.target.value)} className="w-full p-3 text-lg font-bold border-2 border-white/80 rounded-xl bg-white/60 focus:ring-4 focus:ring-purple-200 focus:border-purple-400 outline-none cursor-pointer">
                                                {units.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="block text-base md:text-lg font-bold text-gray-700">パート (小単元)</label>
                                            <select value={selectedPart} onChange={(e) => setSelectedPart(e.target.value)} disabled={partsInUnit.length === 0} className="w-full p-3 text-lg font-bold border-2 border-white/80 rounded-xl bg-white/60 focus:ring-4 focus:ring-purple-200 focus:border-purple-400 outline-none cursor-pointer disabled:opacity-50">
                                                {partsInUnit.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-2 pt-4 border-t border-purple-200/50">
                                        <label className="block text-base md:text-lg font-bold text-gray-700">出題形式（クイズ用）</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 md:gap-3">
                                            <button onClick={() => setMode('ja-en')} className={`p-3 md:p-4 rounded-xl border-2 md:border-4 font-black text-base md:text-lg transition-all ${mode === 'ja-en' ? 'border-purple-400 bg-purple-100/80 text-purple-800 shadow-md transform scale-[1.02]' : 'border-white/80 bg-white/50 text-gray-600 hover:bg-white/80'}`}><div className="text-xs md:text-sm font-bold opacity-70 mb-1">日本語の意味から</div>英単語</button>
                                            <button onClick={() => setMode('en-ja')} className={`p-3 md:p-4 rounded-xl border-2 md:border-4 font-black text-base md:text-lg transition-all ${mode === 'en-ja' ? 'border-purple-400 bg-purple-100/80 text-purple-800 shadow-md transform scale-[1.02]' : 'border-white/80 bg-white/50 text-gray-600 hover:bg-white/80'}`}><div className="text-xs md:text-sm font-bold opacity-70 mb-1">英単語から</div>日本語</button>
                                            <button onClick={() => setMode('def-en')} className={`p-3 md:p-4 rounded-xl border-2 md:border-4 font-black text-base md:text-lg transition-all ${mode === 'def-en' ? 'border-emerald-400 bg-emerald-100/80 text-emerald-800 shadow-md transform scale-[1.02]' : 'border-white/80 bg-white/50 text-gray-600 hover:bg-white/80'}`}><div className="text-xs md:text-sm font-bold opacity-70 mb-1">英英定義から</div>英単語</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2 shrink-0">
                                    <button onClick={startLearning} className="bg-white/70 border-4 border-purple-300 hover:bg-purple-100 text-purple-900 font-black text-xl md:text-2xl py-4 rounded-[1.5rem] shadow-xl btn-3d border-purple-400 tracking-wider transition-all">
                                        単語を学習する 📖
                                    </button>
                                    <button onClick={startGame} className="bg-gradient-to-b from-yellow-300 to-orange-400 hover:brightness-110 text-white font-black text-2xl md:text-3xl py-4 rounded-[1.5rem] shadow-xl btn-3d border-orange-500 tracking-wider text-shadow">
                                        クイズを始める 🚀
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 学習モード画面 */}
                        {gameState === 'learning' && learningWords.length > 0 && (
                            <div className="flex-1 flex flex-col w-full h-full overflow-hidden animate-fade-in space-y-3">
                                {/* 上部：モード切替タブ ＆ シャッフル・元に戻すボタン */}
                                <div className="flex justify-between items-center glass-panel p-2 rounded-2xl border border-white/60 shrink-0 gap-2 flex-wrap sm:flex-nowrap">
                                    <div className="flex space-x-1 md:space-x-2">
                                        <button 
                                            onClick={() => { setLearningTab('list'); setShowCardAnswer(false); }}
                                            className={`px-3 md:px-5 py-2 rounded-xl font-bold transition-all text-xs md:text-base ${learningTab === 'list' ? 'bg-purple-600 text-white shadow-md' : 'bg-transparent text-purple-900 hover:bg-white/40'}`}
                                        >
                                            単語リスト 📋
                                        </button>
                                        <button 
                                            onClick={() => { setLearningTab('card'); setShowCardAnswer(false); }}
                                            className={`px-3 md:px-5 py-2 rounded-xl font-bold transition-all text-xs md:text-base ${learningTab === 'card' ? 'bg-purple-600 text-white shadow-md' : 'bg-transparent text-purple-900 hover:bg-white/40'}`}
                                        >
                                            フラッシュカード 🎴
                                        </button>
                                    </div>
                                    
                                    {/* ① シャッフルと元に戻すボタンを統合 */}
                                    <div className="flex space-x-1 md:space-x-2 shrink-0">
                                        <button 
                                            onClick={shuffleLearningWords}
                                            className="p-2 bg-purple-100 hover:bg-purple-200 text-purple-800 rounded-xl transition-all font-bold flex items-center text-xs"
                                            title="ランダムにシャッフル"
                                        >
                                            <ShuffleIcon className="w-3.5 h-3.5 mr-1" />
                                            <span>シャッフル</span>
                                        </button>
                                        <button 
                                            onClick={resetLearningWordsOrder}
                                            className="p-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-xl transition-all font-bold flex items-center text-xs"
                                            title="元の順番に戻す"
                                        >
                                            <UndoIcon className="w-3.5 h-3.5 mr-1" />
                                            <span>元の順に戻す</span>
                                        </button>
                                    </div>
                                </div>

                                {learningTab === 'card' ? (
                                    /* ③ フラッシュカードビュー（フリップ廃止、解答表示ステップ化、出題順選択） */
                                    <div className="flex-1 flex flex-col justify-between overflow-hidden">
                                        <div className="flex justify-between items-center font-bold text-purple-950 text-xs md:text-sm shrink-0 mb-1">
                                            {/* ③ 表示方向（英➔日 or 日➔英）の切り替えスイッチ */}
                                            <div className="flex bg-white/50 p-1 rounded-xl border border-white/80">
                                                <button 
                                                    onClick={() => { setLearningCardMode('en-ja'); setShowCardAnswer(false); }}
                                                    className={`px-3 py-1 rounded-lg text-xs transition-all ${learningCardMode === 'en-ja' ? 'bg-purple-600 text-white' : 'text-purple-950'}`}
                                                >
                                                    英語 ➔ 日本語
                                                </button>
                                                <button 
                                                    onClick={() => { setLearningCardMode('ja-en'); setShowCardAnswer(false); }}
                                                    className={`px-3 py-1 rounded-lg text-xs transition-all ${learningCardMode === 'ja-en' ? 'bg-purple-600 text-white' : 'text-purple-950'}`}
                                                >
                                                    日本語 ➔ 英語
                                                </button>
                                            </div>
                                            <div>
                                                単語 {learningIndex + 1} / {learningWords.length}
                                            </div>
                                        </div>

                                        {/* フラッシュカード本体 */}
                                        <div className="flex-1 my-2 w-full glass-panel rounded-[2rem] p-4 md:p-6 flex flex-col justify-between items-center border border-white/60 relative overflow-y-auto">
                                            
                                            {/* 問題側表示 */}
                                            <div className="flex-1 flex flex-col justify-center items-center w-full min-h-[100px]">
                                                {learningCardMode === 'en-ja' ? (
                                                    /* 英語 ➔ 日本語モード */
                                                    <div className="text-center w-full">
                                                        <div className="text-xs md:text-sm text-purple-700 font-black mb-3 bg-purple-200/50 px-4 py-1 rounded-full inline-block">{learningWords[learningIndex].pos}</div>
                                                        <h3 className="text-4xl sm:text-6xl md:text-7xl font-black text-gray-800 tracking-tight break-words">{learningWords[learningIndex].en}</h3>
                                                        <button 
                                                            onClick={() => speakWord(learningWords[learningIndex].en)}
                                                            className="mt-4 p-3 bg-purple-100 hover:bg-purple-200 text-purple-800 rounded-full transition-all inline-flex items-center justify-center active:scale-90"
                                                            title="音声発音"
                                                        >
                                                            <VolumeIcon className="w-5 h-5" />
                                                        </button>
                                                    </div>
                                                ) : (
                                                    /* 日本語 ➔ 英語モード */
                                                    <div className="text-center w-full">
                                                        <div className="text-xs md:text-sm text-purple-700 font-black mb-3 bg-purple-200/50 px-4 py-1 rounded-full inline-block">{learningWords[learningIndex].pos}</div>
                                                        <h3 className="text-3xl sm:text-5xl md:text-6xl font-black text-purple-950 tracking-tight leading-snug break-words">{learningWords[learningIndex].ja}</h3>
                                                    </div>
                                                )}
                                            </div>

                                            {/* 解答エリア（答えを表示しているときだけスッと表示される） */}
                                            <div className={`w-full border-t border-purple-200/40 pt-4 flex-1 flex flex-col justify-center items-center transition-all duration-300 min-h-[100px] ${showCardAnswer ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                                                {showCardAnswer && (
                                                    learningCardMode === 'en-ja' ? (
                                                        /* 英語 ➔ 日本語モードの解答：意味を表示 */
                                                        <div className="text-center w-full">
                                                            <h4 className="text-3xl sm:text-5xl md:text-6xl font-black text-purple-950 tracking-tight leading-snug break-words">{learningWords[learningIndex].ja}</h4>
                                                            {learningWords[learningIndex].definition && (
                                                                <p className="text-xs md:text-sm text-gray-500 italic mt-3 bg-white/60 p-2.5 rounded-xl max-w-lg mx-auto border border-purple-100">
                                                                    {learningWords[learningIndex].definition}
                                                                </p>
                                                            )}
                                                        </div>
                                                    ) : (
                                                        /* 日本語 ➔ 英語モードの解答：スペルと音声を表示 */
                                                        <div className="text-center w-full">
                                                            <h4 className="text-4xl sm:text-6xl md:text-7xl font-black text-gray-800 tracking-tight break-words">{learningWords[learningIndex].en}</h4>
                                                            <button 
                                                                onClick={() => speakWord(learningWords[learningIndex].en)}
                                                                className="mt-3 p-3 bg-purple-600 hover:bg-purple-700 text-white rounded-full shadow-md transition-all active:scale-90 inline-flex items-center justify-center"
                                                                title="音声発音"
                                                            >
                                                                <VolumeIcon className="w-5 h-5" />
                                                            </button>
                                                            {learningWords[learningIndex].definition && (
                                                                <p className="text-xs md:text-sm text-gray-500 italic mt-3 bg-white/60 p-2.5 rounded-xl max-w-lg mx-auto border border-purple-100">
                                                                    {learningWords[learningIndex].definition}
                                                                </p>
                                                            )}
                                                        </div>
                                                    )
                                                )}
                                            </div>

                                        </div>

                                        {/* ③ 下部ナビゲーション: 前へ / [答えを表示/次へ] の構成 */}
                                        <div className="flex justify-between items-center gap-3 shrink-0">
                                            <button 
                                                onClick={handlePrevCard}
                                                disabled={learningIndex === 0}
                                                className="w-1/3 py-4 bg-white/80 hover:bg-white text-purple-900 font-black rounded-2xl border-2 border-white/60 shadow-md text-base md:text-lg transition-all active:scale-95 disabled:opacity-40"
                                            >
                                                ← 前の単語
                                            </button>
                                            
                                            {/* ③「答えを表示」と「次の単語へ」をステップに合わせた1ボタンで制御 */}
                                            <button 
                                                onClick={handleNextCard}
                                                disabled={showCardAnswer && learningIndex === learningWords.length - 1}
                                                className={`w-2/3 py-4 font-black rounded-2xl shadow-md text-base md:text-lg transition-all active:scale-95 ${
                                                    !showCardAnswer 
                                                    ? 'bg-amber-400 hover:bg-amber-500 text-amber-950 border-b-4 border-amber-600' 
                                                    : 'bg-purple-600 hover:bg-purple-700 text-white'
                                                }`}
                                            >
                                                {!showCardAnswer ? '答えを表示する 👁️' : '次の単語へ ➡️'}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    /* ①② デフォルト表示の単語リストビュー */
                                    <div className="flex-1 overflow-y-auto glass-panel rounded-[2rem] border border-white/60 p-4 shadow-inner space-y-3 scrollbar-thin">
                                        {learningWords.map((word, idx) => (
                                            <div 
                                                key={idx}
                                                className="bg-white/80 p-4 rounded-2xl border border-purple-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-2 hover:border-purple-300 transition-all shadow-sm animate-[fadeIn_0.2s_ease-in-out]"
                                            >
                                                <div className="space-y-1 flex-1 w-full">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <span className="font-bold text-xs text-purple-700 bg-purple-100 px-2.5 py-0.5 rounded-full">{word.pos}</span>
                                                        <h4 className="text-xl md:text-2xl font-black text-gray-800">{word.en}</h4>
                                                        <button 
                                                            onClick={() => speakWord(word.en)}
                                                            className="p-1 text-purple-600 hover:bg-purple-100 rounded-lg transition-all active:scale-90"
                                                            title="音声発音"
                                                        >
                                                            <VolumeIcon className="w-5 h-5" />
                                                        </button>
                                                    </div>
                                                    <p className="text-lg md:text-xl font-bold text-purple-950">{word.ja}</p>
                                                    {word.definition && (
                                                        <p className="text-xs md:text-sm text-gray-500 italic mt-1 bg-gray-50/50 p-2 rounded-xl">
                                                            {word.definition}
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <button 
                                    onClick={() => setGameState('menu')}
                                    className="w-full bg-gray-800 hover:bg-gray-900 text-white font-black text-lg py-3 rounded-2xl shadow-md shrink-0 transition-all active:scale-95"
                                >
                                    メニューに戻る ↩️
                                </button>
                            </div>
                        )}

                        {gameState === 'playing' && currentQuestion && (
                            <div className="flex-1 flex flex-col w-full h-full overflow-hidden">
                                <div className="flex justify-between items-center mb-3 md:mb-4 glass-panel p-3 md:p-4 rounded-2xl shadow-sm border border-white/60 shrink-0">
                                    <div className="text-purple-800 font-black bg-purple-200/50 px-4 py-2 rounded-xl text-lg md:text-xl shadow-sm border border-purple-200/50 flex items-center"><Trophy className="w-5 h-5 mr-2 text-purple-600" /> {score.correct}</div>
                                    <div className={`font-black text-xl md:text-2xl flex items-center px-4 py-2 rounded-xl shadow-sm border ${timeLeft <= 10 ? 'bg-red-400/90 text-white border-red-500 animate-pulse' : 'bg-white/60 text-gray-800 border-white/80'}`}><Timer className="w-6 h-6 mr-2" /> {timeLeft}</div>
                                </div>
                                
                                <div className="flex flex-col items-center justify-center mb-3 md:mb-4 glass-panel rounded-[1.5rem] shadow-md border border-white/60 p-4 md:p-6 min-h-[100px] md:min-h-[140px] shrink-0">
                                    {mode !== 'def-en' && <div className="text-sm md:text-base text-purple-700 font-black mb-2 md:mb-3 bg-purple-200/60 px-4 py-1 rounded-full border border-purple-300/50 shadow-sm">{currentQuestion.answerWord.pos}</div>}
                                    {mode === 'ja-en' && <h2 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black text-gray-800 text-center break-words w-full tracking-tight drop-shadow-sm">{currentQuestion.answerWord.ja}</h2>}
                                    {mode === 'en-ja' && <h2 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black text-gray-800 text-center break-words w-full tracking-tight drop-shadow-sm">{currentQuestion.answerWord.en}</h2>}
                                    {mode === 'def-en' && <h2 className="text-lg sm:text-xl md:text-2xl lg:text-3xl font-bold text-gray-800 text-center break-words w-full leading-snug drop-shadow-sm">"{currentQuestion.answerWord.definition}"</h2>}
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 mt-auto w-full flex-1">
                                    {currentQuestion.options.map((option, idx) => {
                                        const c = OPTION_COLORS[idx % 4];
                                        const optionText = mode === 'en-ja' ? option.ja : option.en;
                                        
                                        let textSizeClass = "text-2xl sm:text-3xl md:text-4xl"; 
                                        if (optionText.length >= 25) {
                                            textSizeClass = "text-base sm:text-lg md:text-xl lg:text-2xl leading-tight";
                                        } else if (optionText.length >= 15) {
                                            textSizeClass = "text-lg sm:text-xl md:text-2xl lg:text-3xl leading-tight";
                                        } else if (optionText.length >= 8) {
                                            textSizeClass = "text-xl sm:text-2xl md:text-3xl lg:text-4xl leading-tight";
                                        }

                                        let btnClass = `relative w-full h-full p-3 md:p-6 rounded-[1.5rem] font-black ${textSizeClass} flex items-center justify-center break-words text-white shadow-md btn-3d ${c.bg} ${c.border} `;
                                        if (isTransitioning) {
                                            if (option.en === currentQuestion.answerWord.en) btnClass += " btn-correct ring-4 ring-white ring-offset-4 ring-offset-transparent";
                                            else btnClass += " btn-wrong";
                                        } else if (selectedWrongOptions.some(o => o.en === option.en)) {
                                            btnClass += " btn-wrong";
                                        } else {
                                            btnClass += " hover:brightness-110";
                                        }
                                        return (
                                            <button key={idx} onClick={() => handleAnswer(option)} disabled={isTransitioning || selectedWrongOptions.some(o => o.en === option.en)} className={btnClass}>
                                                <span className="drop-shadow-md">{optionText}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {gameState === 'result' && (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-4 md:space-y-6 text-center max-w-4xl mx-auto w-full overflow-hidden py-2">
                                <div className="glass-panel w-full p-4 md:p-8 rounded-[2rem] border border-white/60 shadow-xl shrink-0">
                                    <div className="text-base md:text-lg text-purple-900/70 font-black mb-1 uppercase tracking-widest">Score (1分間換算)</div>
                                    <div className="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 via-pink-500 to-purple-600 mb-6 md:mb-8 drop-shadow-sm filter">{finalScore}</div>
                                    <div className="grid grid-cols-2 gap-3 md:gap-6 text-left">
                                        <div className="bg-white/70 p-3 md:p-5 rounded-2xl border-2 border-green-200/80 flex flex-col items-center justify-center col-span-2 sm:col-span-1 shadow-sm">
                                            <span className="text-green-700 text-base md:text-lg font-black mb-1 flex items-center"><Target className="w-5 h-5 mr-1"/> 正解数</span>
                                            <span className="font-black text-gray-800 text-3xl md:text-4xl">{score.correct}<span className="text-lg ml-1 text-gray-500">問</span></span>
                                        </div>
                                        <div className="bg-white/70 p-3 md:p-5 rounded-2xl border-2 border-red-200/80 flex flex-col items-center justify-center col-span-2 sm:col-span-1 shadow-sm">
                                            <span className="text-red-600 text-base md:text-lg font-black mb-1 flex items-center"><AlertCircle className="w-5 h-5 mr-1"/> ミス回数</span>
                                            <span className="font-black text-gray-800 text-3xl md:text-4xl">{score.wrong}<span className="text-lg ml-1 text-gray-500">回</span></span>
                                        </div>
                                        <div className="bg-white/70 p-3 md:p-5 rounded-2xl border-2 border-blue-200/80 flex flex-col items-center justify-center col-span-2 shadow-sm">
                                            <span className="text-blue-600 text-base md:text-lg font-black mb-1 uppercase tracking-wider">Accuracy</span>
                                            <span className="font-black text-blue-600 text-4xl md:text-5xl">{accuracy}<span className="text-2xl ml-1">%</span></span>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => { setErrorMsg(""); setGameState('menu'); }} className="w-full mt-2 md:mt-4 bg-purple-900 hover:bg-purple-800 text-white font-black text-xl md:text-2xl py-4 md:py-5 rounded-[1.5rem] shadow-xl btn-3d border-purple-950 tracking-wider transition-all shrink-0">メニューに戻る ↩️</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
